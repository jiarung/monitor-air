; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- ESP32-S3-WROOM-1 N16R8: 16MB quad flash + 8MB octal PSRAM ---
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = dio_opi   ; DIO flash + octal PSRAM
; This unit's off-brand flash (mfr 0x46) won't do DIO/QIO fast reads with the
; ROM's default dummy cycles -> "Invalid image block, can't boot". DOUT works.
; flash_mode=dout sets the header mode byte; build.boot=dio selects the prebuilt
; bootloader_dio_80m.elf (no dout variant ships), then its header is patched to dout.
board_build.flash_mode = dout
board_build.boot = dio
board_build.f_flash = 80000000L

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    claws/BH1750@^1.3.0
    adafruit/Adafruit BME680 Library@^2.0.5
    adafruit/Adafruit AS7341@^1.4.0
    knolleary/PubSubClient@^2.8

monitor_speed = 115200
