apiVersion: 1

datasources:
  - name: InfluxDB
    uid: influxdb-monitor-air
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: monitor-air
      defaultBucket: sensors
      # Safe here: Grafana ↔ InfluxDB talk over the Docker-internal network (no
      # TLS in play). Remove this if you ever put real TLS in front of InfluxDB,
      # otherwise certificate validation is silently skipped.
      tlsSkipVerify: true
    secureJsonData:
      token: $INFLUX_TOKEN
