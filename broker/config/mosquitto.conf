# Mosquitto config for monitor-air broker.
#
# mosquitto 2.x defaults to allow_anonymous=false and only binds localhost
# unless a listener is declared — so both lines below are required for LAN
# devices (e.g. the ESP32) to connect.

listener 1883 0.0.0.0
protocol mqtt

# --- Security ---
# Open/anonymous for now (LAN testing only). To lock down later:
#   allow_anonymous false
#   password_file /mosquitto/config/passwd     # create with: mosquitto_passwd
#   # optional ACLs: acl_file /mosquitto/config/aclfile
# For TLS, add a second listener:
#   listener 8883 0.0.0.0
#   cafile/certfile/keyfile ...
allow_anonymous true

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
# stdout only, the Docker way: view with `docker compose logs -f mosquitto`.
log_dest stdout
