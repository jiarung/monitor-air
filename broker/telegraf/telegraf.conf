# Telegraf — bridges MQTT (Mosquitto) into InfluxDB. No code, just config.

[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

# --- Input: subscribe to the broker ---
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["monitor-air/+/telemetry"]
  qos = 0
  data_format = "json"
  # measurement name for everything coming in on these topics
  name_override = "air"
  # all telemetry numbers are floats by contract (avoids int/float field conflicts)
  json_string_fields = []

  # turn the topic's 2nd segment into a `device` tag:
  #   monitor-air/<device>/telemetry  ->  device=<device>
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "monitor-air/+/telemetry"
    tags = "_/device/_"

# --- Input: plant-light on/off state (so Grafana can show when it ran) ---
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["monitor-air/+/light/state"]
  qos = 1
  data_format = "json"
  name_override = "light"
  # only the numeric `on` (1/0); state/source are strings, dropped by default

  # here the 2nd segment is a location, not a device:
  #   monitor-air/<location>/light/state  ->  location=<location>
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "monitor-air/+/light/state"
    tags = "_/location/_/_"

# --- Output: write to InfluxDB 2.x ---
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "monitor-air"
  bucket = "sensors"
